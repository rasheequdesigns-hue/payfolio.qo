<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Mr. Rasheequ Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            text-align: center;
        }
        
        .admin-login-container h2 {
            margin-bottom: 30px;
            font-size: 2rem;
        }
        
        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .admin-form input {
            padding: 14px;
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: #e6e6eb;
        }
        
        .admin-form button {
            padding: 14px;
            border-radius: 12px;
            background: #00ff88;
            color: #000;
            font-weight: 600;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .admin-form button:hover {
            background: #00cc6a;
        }
        
        .error-message {
            color: #ff6b6b;
            margin-top: 10px;
        }
        
        .admin-dashboard {
            display: none;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .dashboard-title h2 {
            font-size: 2rem;
            margin: 0;
        }
        
        .dashboard-title p {
            color: #9aa0b3;
            margin: 5px 0 0 0;
        }
        
        .logout-btn {
            background: #ff6b6b;
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
        }
        
        .logout-btn:hover {
            background: #ff5252;
        }
        
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin: 10px 0;
            color: #00ff88;
        }
        
        .stat-label {
            color: #9aa0b3;
        }
        
        .messages-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .messages-table th {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            text-align: left;
        }
        
        .messages-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        .messages-table tr:last-child td {
            border-bottom: none;
        }
        
        .tab-navigation {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab-button {
            padding: 10px 20px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #e6e6eb;
            cursor: pointer;
        }
        
        .tab-button.active {
            background: #00ff88;
            color: #000;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .portfolio-upload {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 30px;
            margin-top: 30px;
        }
        
        .upload-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group label {
            font-weight: 500;
        }
        
        .form-group input, .form-group textarea, .form-group select {
            padding: 14px;
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: #e6e6eb;
        }
        
        .success-message {
            color: #00ff88;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- Admin Login Form -->
    <div class="admin-login-container" id="loginContainer">
        <h2>Admin Login</h2>
        <form class="admin-form" id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <div class="error-message" id="errorMessage"></div>
        </form>
    </div>
    
    <!-- Admin Dashboard -->
    <div class="admin-dashboard" id="dashboard">
        <div class="dashboard-header">
            <div class="dashboard-title">
                <h2>Admin Dashboard</h2>
                <p>Manage your portfolio and messages</p>
            </div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
        
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-label">Total Messages</div>
                <div class="stat-value" id="totalMessages">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Portfolio Items</div>
                <div class="stat-value" id="totalPortfolio">4</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Last Message</div>
                <div class="stat-value" id="lastMessageDate">-</div>
            </div>
        </div>
        
        <div class="tab-navigation">
            <button class="tab-button active" data-tab="messages">Messages</button>
            <button class="tab-button" data-tab="portfolio">Portfolio</button>
            <button class="tab-button" data-tab="settings">Settings</button>
        </div>
        
        <div class="tab-content active" id="messagesTab">
            <h3>Contact Messages</h3>
            <table class="messages-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Message</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="messagesTableBody">
                    <!-- Messages will be loaded here -->
                </tbody>
            </table>
        </div>
        
        <div class="tab-content" id="portfolioTab">
            <h3>Manage Portfolio</h3>
            <div class="portfolio-upload">
                <h4>Add New Portfolio Item</h4>
                <form class="upload-form" id="portfolioForm">
                    <div class="form-group">
                        <label for="projectTitle">Project Title</label>
                        <input type="text" id="projectTitle" placeholder="Enter project title" required>
                    </div>
                    <div class="form-group">
                        <label for="projectCategory">Category</label>
                        <select id="projectCategory" required>
                            <option value="">Select category</option>
                            <option value="branding">Branding</option>
                            <option value="ui-design">UI Design</option>
                            <option value="illustration">Illustration</option>
                            <option value="packaging">Packaging</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="projectDescription">Description</label>
                        <textarea id="projectDescription" placeholder="Enter project description" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="projectImage">Image Upload</label>
                        <input type="file" id="projectImage" accept="image/*">
                    </div>
                    <button type="submit" class="btn primary">Add Project</button>
                    <div class="success-message" id="portfolioSuccess"></div>
                </form>
            </div>
        </div>
        
        <div class="tab-content" id="settingsTab">
            <h3>Settings</h3>
            <div class="portfolio-upload">
                <h4>Change Password</h4>
                <form class="upload-form" id="passwordForm">
                    <div class="form-group">
                        <label for="currentPassword">Current Password</label>
                        <input type="password" id="currentPassword" placeholder="Enter current password" required>
                    </div>
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" placeholder="Enter new password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm New Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                    </div>
                    <button type="submit" class="btn primary">Update Password</button>
                    <div class="success-message" id="passwordSuccess"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Admin JavaScript functionality
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const loginContainer = document.getElementById('loginContainer');
            const dashboard = document.getElementById('dashboard');
            const errorMessage = document.getElementById('errorMessage');
            const logoutBtn = document.getElementById('logoutBtn');
            const messagesTableBody = document.getElementById('messagesTableBody');
            const tabButtons = document.querySelectorAll('.tab-button');
            const tabContents = document.querySelectorAll('.tab-content');
            
            // Tab navigation
            tabButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const tabId = button.getAttribute('data-tab');
                    
                    // Update active tab button
                    tabButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                    
                    // Show active tab content
                    tabContents.forEach(content => {
                        content.classList.remove('active');
                        if (content.id === `${tabId}Tab`) {
                            content.classList.add('active');
                        }
                    });
                });
            });
            
            // Check if user is already logged in
            const token = localStorage.getItem('adminToken');
            if (token) {
                showDashboard();
                loadMessages();
                updateStats();
            }
            
            // Handle login form submission
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                
                try {
                    const response = await fetch('/api/admin/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ username, password })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        // Save token and show dashboard
                        localStorage.setItem('adminToken', data.token);
                        showDashboard();
                        loadMessages();
                        updateStats();
                    } else {
                        errorMessage.textContent = data.error || 'Login failed';
                    }
                } catch (error) {
                    errorMessage.textContent = 'An error occurred. Please try again.';
                }
            });
            
            // Handle logout
            logoutBtn.addEventListener('click', function() {
                localStorage.removeItem('adminToken');
                showLogin();
            });
            
            // Show dashboard
            function showDashboard() {
                loginContainer.style.display = 'none';
                dashboard.style.display = 'block';
            }
            
            // Show login form
            function showLogin() {
                loginContainer.style.display = 'block';
                dashboard.style.display = 'none';
                loginForm.reset();
                errorMessage.textContent = '';
            }
            
            // Load messages
            async function loadMessages() {
                try {
                    const token = localStorage.getItem('adminToken');
                    const response = await fetch('/api/admin/messages', {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    
                    const messages = await response.json();
                    
                    // Clear table
                    messagesTableBody.innerHTML = '';
                    
                    // Add messages to table
                    messages.forEach(message => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${message.name}</td>
                            <td>${message.email}</td>
                            <td>${message.message.substring(0, 50)}${message.message.length > 50 ? '...' : ''}</td>
                            <td>${new Date(message.date).toLocaleDateString()}</td>
                        `;
                        messagesTableBody.appendChild(row);
                    });
                    
                    // If no messages, show a message
                    if (messages.length === 0) {
                        const row = document.createElement('tr');
                        row.innerHTML = '<td colspan="4">No messages yet</td>';
                        messagesTableBody.appendChild(row);
                    }
                    
                    // Update stats
                    updateStats(messages);
                } catch (error) {
                    console.error('Error loading messages:', error);
                }
            }
            
            // Load portfolio items
            async function loadPortfolioItems() {
                try {
                    const token = localStorage.getItem('adminToken');
                    const response = await fetch('/api/admin/portfolio', {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    
                    const items = await response.json();
                    document.getElementById('totalPortfolio').textContent = items.length;
                } catch (error) {
                    console.error('Error loading portfolio items:', error);
                }
            }
            
            // Update statistics
            function updateStats(messages) {
                document.getElementById('totalMessages').textContent = messages.length;
                
                if (messages.length > 0) {
                    const lastMessage = messages[messages.length - 1];
                    document.getElementById('lastMessageDate').textContent = new Date(lastMessage.date).toLocaleDateString();
                } else {
                    document.getElementById('lastMessageDate').textContent = '-';
                }
                
                // Load portfolio items for stats
                loadPortfolioItems();
            }
            
            // Portfolio form submission
            const portfolioForm = document.getElementById('portfolioForm');
            if (portfolioForm) {
                portfolioForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const title = document.getElementById('projectTitle').value;
                    const category = document.getElementById('projectCategory').value;
                    const description = document.getElementById('projectDescription').value;
                    
                    try {
                        const token = localStorage.getItem('adminToken');
                        const response = await fetch('/api/admin/portfolio', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({ title, category, description })
                        });
                        
                        const data = await response.json();
                        
                        if (data.success) {
                            const successMessage = document.getElementById('portfolioSuccess');
                            successMessage.textContent = data.message;
                            
                            // Reset form
                            this.reset();
                            
                            // Update stats
                            loadPortfolioItems();
                            
                            // Clear success message after 3 seconds
                            setTimeout(() => {
                                successMessage.textContent = '';
                            }, 3000);
                        } else {
                            alert('Error: ' + (data.error || 'Failed to add portfolio item'));
                        }
                    } catch (error) {
                        console.error('Error adding portfolio item:', error);
                        alert('An error occurred while adding the portfolio item. Please try again.');
                    }
                });
            }
            
            // Password form submission
            const passwordForm = document.getElementById('passwordForm');
            if (passwordForm) {
                passwordForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    const currentPassword = document.getElementById('currentPassword').value;
                    const newPassword = document.getElementById('newPassword').value;
                    const confirmPassword = document.getElementById('confirmPassword').value;
                    
                    // Simple validation
                    if (newPassword !== confirmPassword) {
                        alert('New passwords do not match!');
                        return;
                    }
                    
                    // In a real implementation, this would send data to the server
                    const successMessage = document.getElementById('passwordSuccess');
                    successMessage.textContent = 'Password updated successfully!';
                    
                    // Reset form
                    this.reset();
                    
                    // Clear success message after 3 seconds
                    setTimeout(() => {
                        successMessage.textContent = '';
                    }, 3000);
                });
            }
        });
    </script>
</body>
</html>
